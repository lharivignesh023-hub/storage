name: Sync Ledger

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download ledger
        run: |
          curl https://c8do-production.up.railway.app/chain -o blockchain.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blockchain.txt
          git diff --cached --quiet || git commit -m "Update ledger"
          git push
