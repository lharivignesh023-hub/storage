name: Fetch and Save Blockchain Data

on:
  push:
    branches:
      - main  # Triggers immediately when you commit/push to the main branch
  schedule:
    - cron: '0 */2 * * *'  # Triggers automatically every 2 hours
  workflow_dispatch:  # Allows you to trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Fetch Blocks and Save Data
      run: |
        # Create data directory if it doesn't exist
        mkdir -p data

        # Fetch the entire chain from your Cloudflare Worker server
        curl -s "https://c8doc-node.lharivignesh023.workers.dev/chain" > data/blockchain.json

        # Save the last updated timestamp in UTC
        echo "{\"last_updated\": \"$(date -u '+%Y-%m-%d %H:%M:%S UTC')\"}" > data/status.json

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the updated files
        git add data/blockchain.json data/status.json
        
        # Only commit and push if there are actual updates to the data
        if git diff --staged --quiet; then
          echo "No new updates found."
        else
          git commit -m "Auto-update: Fetched latest blocks at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
        fi
